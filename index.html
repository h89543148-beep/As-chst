    /<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AS Chat v3</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <script src="https://lucent-klepon-a1829f.netlify.app/api.html"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="auth-modal" style="display:flex; position:fixed; top:0; left:0; width:100%; height:100vh; background:rgba(0,0,0,0.95); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:#1e293b; padding:30px; border-radius:20px; max-width:360px; text-align:center;">
      <h2 style="color:white;">Welcome to AS Chat</h2>
      <input type="email" id="auth-email" placeholder="Email" style="width:100%; padding:12px; margin:10px 0; background:#0f172a; color:white; border:none; border-radius:10px;">
      <input type="password" id="auth-password" placeholder="Password" style="width:100%; padding:12px; margin:10px 0; background:#0f172a; color:white; border:none; border-radius:10px;">
      <button onclick="login()" style="width:100%; padding:12px; background:#ff6b35; color:white; border:none; border-radius:10px;">Login</button>
      <button onclick="register()" style="width:100%; padding:12px; background:transparent; color:#ff6b35; border:2px solid #ff6b35; border-radius:10px; margin-top:10px;">Register</button>
      <p id="auth-error" style="color:#ef476f; margin-top:10px;"></p>
    </div>
  </div>

  <div class="topbar"><span>AS SYSTEM</span></div>
  <div class="chat-area" id="chat-container"></div>
  <div class="input-container">
    <input type="text" id="user-input" placeholder="AS se pucho...">
    <button id="send-btn">Pucho</button>
  </div>

  <script>
    // Firebase Config
    firebase.initializeApp({
      apiKey: "AIzaSyD7RwL8kwQ91P1vcPhXnxFNFIDQsWdUfhE",
      authDomain: "ad-hoc-d078c.firebaseapp.com",
      projectId: "ad-hoc-d078c",
      storageBucket: "ad-hoc-d078c.firebasestorage.app",
      messagingSenderId: "485452494263",
      appId: "1:485452494263:web:038a30628b871f3d7a6432"
    });
    const db = firebase.firestore();
    const auth = firebase.auth();

    window.login = async function() {
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      const errorEl = document.getElementById('auth-error');
      try { await auth.signInWithEmailAndPassword(email, password); }
      catch(e) { errorEl.textContent = e.message; }
    };

    window.register = async function() {
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      const errorEl = document.getElementById('auth-error');
      try { await auth.createUserWithEmailAndPassword(email, password); }
      catch(e) { errorEl.textContent = e.message; }
    };

    const box = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");
    const chatArea = document.getElementById("chat-container");

    let currentUser = null;

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('auth-modal').style.display = 'none';
        await loadChatHistory();
      } else {
        document.getElementById('auth-modal').style.display = 'flex';
      }
    });

    async function loadChatHistory() {
      if (!currentUser) return;
      const snapshot = await db.collection("chats")
        .where("userId", "==", currentUser.uid)
        .orderBy("timestamp", "asc").get();
      chatArea.innerHTML = "";
      snapshot.forEach(doc => {
        renderMessage(doc.data().role, doc.data().content, false);
      });
    }

    function renderMessage(role, content, save = true) {
      const bubble = document.createElement("div");
      bubble.className = role === "user" ? "user-chat-bubble" : "as-chat-bubble";
      bubble.innerHTML = role === "user" ? "<strong>Tum:</strong> " + content : "<strong>AS:</strong> " + content;
      chatArea.appendChild(bubble);
      chatArea.scrollTop = chatArea.scrollHeight;
      if (save) saveMessage(role, content);
    }

    async function saveMessage(role, content) {
      if (!currentUser) return;
      await db.collection("chats").add({
        userId: currentUser.uid,
        role: role,
        content: content,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    async function askAI(sawal) {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": "Bearer " + API_KEYS.GROQ, "Content-Type": "application/json" },
        body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{ role: "user", content: sawal }] })
      });
      const data = await res.json();
      return data.choices[0].message.content;
    }

    btn.onclick = async function () {
      let input = box.value.trim();
      if (!input) return;
      renderMessage("user", input);
      box.value = "";
      const aiDiv = document.createElement("div");
      aiDiv.className = "as-chat-bubble";
      aiDiv.innerHTML = "<strong>AS:</strong> Soch raha hoon...";
      chatArea.appendChild(aiDiv);
      let jawab = "Bhai jawab nahi aa paya.";
      try { jawab = await askAI(input); } catch(e) {}
      aiDiv.innerHTML = "<strong>AS:</strong> " + jawab;
      saveMessage("assistant", jawab);
    };

    box.addEventListener("keypress", (e) => { if (e.key === "Enter") btn.click(); });
  </script>
</body>
</html>
